<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testseite</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .box {
      background: #c62828;
      padding: 40px;
      border-radius: 16px;
      max-width: 700px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 42px;
      margin-bottom: 20px;
    }

    p {
      font-size: 22px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Seite funktioniert</h1>
    <p>Deine GitHub Pages Seite ist online.</p>
  </div>
</body>
</html>
